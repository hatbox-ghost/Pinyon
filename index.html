/* Pinyon archival instrument skin */
body{padding:14px;background:radial-gradient(circle at 50% -10%,rgba(183,155,98,.075),transparent 35%),radial-gradient(circle at 78% 12%,rgba(143,181,161,.04),transparent 34%),linear-gradient(180deg,#151410 0%,#10110f 54%,#0b0c0b 100%)}
.device{width:min(1220px,calc(100vw - 28px));height:min(720px,calc(100vh - 28px));min-height:560px;grid-template-rows:48px 1fr 88px;gap:12px;padding:12px;background:linear-gradient(180deg,rgba(38,39,34,.76),rgba(14,15,13,.96));border:1px solid rgba(205,198,181,.38);box-shadow:0 26px 90px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.025)}

.bar{padding:6px;gap:6px;grid-template-columns:repeat(5,minmax(0,1fr))}.transport{padding:6px}.middle{grid-template-columns:180px minmax(380px,1.36fr) minmax(345px,.88fr);gap:12px}.column{gap:12px}.module{padding:10px 11px}.module h2{margin-bottom:10px;font:650 9px/1 ui-monospace,monospace;letter-spacing:.24em;color:rgba(203,184,139,.76)}.grid{gap:8px}.bottom{width:100%;max-width:100%;grid-template-columns:repeat(10,minmax(0,1fr));gap:4px;overflow:hidden}.param{min-width:0;overflow:hidden;padding:7px 4px 6px}

select,button{height:27px;border:1px solid rgba(137,148,134,.35);background:rgba(13,15,13,.78);font-weight:650;color:rgba(179,197,177,.88)}button:hover,select:hover{border-color:rgba(184,193,174,.42);background:rgba(18,21,18,.9)}.transport button{border-color:rgba(183,155,98,.44);color:rgba(204,184,138,.86);background:rgba(15,15,12,.86)}.transport button.on{background:rgba(183,155,98,.8);color:#12110f}.meter i{background:rgba(140,145,129,.18)}.meter i.on{background:rgba(181,158,103,.72)}

<body>
<div class="device">
  <div class="top"><div class="bar">
    <div class="ctrl"><label>Shape</label><select id="shape"><option>Tree</option><option>Gust</option><option selected>Airy</option><option>Alternating</option><option>Noise Mallet</option><option>Random</option></select></div>
    <div class="ctrl"><label>Scale</label><select id="scale"><option>Off</option><option selected>Major</option><option>Minor</option><option>Dorian</option><option>Mixolydian</option><option>Suspended</option><option>Raga Kafi</option><option>Harmonic</option></select></div>
    <div class="ctrl"><label>Tonic</label><select id="tonic"><option>C</option><option>C#</option><option>D</option><option>Eb</option><option>E</option><option>F</option><option>F#</option><option>G</option><option>Ab</option><option>A</option><option>Bb</option><option>B</option></select></div>
    <div class="ctrl"><label>Intone</label><select id="inton"><optgroup label="Equal / Reference"><option value="Equal Temperament">Equal Temperament</option></optgroup><optgroup label="Just Intonation"><option value="5-Limit" selected>5-Limit</option><option value="7-Limit">7-Limit</option><option value="9-Limit">9-Limit</option><option value="13-Limit">13-Limit</option><option value="17-Limit">17-Limit</option><option value="Partch 11">Partch 11</option></optgroup><optgroup label="Minimalist / Experimental"><option value="Pythagorean">Pythagorean</option><option value="WTP / LMY">WTP / LMY</option><option value="Bohlen-Pierce">Bohlen-Pierce</option></optgroup><optgroup label="Indian / Raga"><option value="Kafi / 22 Shruti">Kafi / 22 Shruti</option><option value="Raga Yaman">Raga Yaman</option><option value="Raga Bhairav">Raga Bhairav</option><option value="Raga Malkauns">Raga Malkauns</option></optgroup></select></div>
    <div class="ctrl"><label>Pink</label><select id="pink"><option>On</option><option>Off</option></select></div>
  </div><div class="transport"><button id="newTree">New</button><div class="meter" id="meter"></div></div></div>
  <div class="middle">
    <div class="column left"><div class="module"><h2>Noise / Wind</h2><div class="grid">
      <div><label>Noise <span class="val" id="noiseV">28</span></label><input id="noise" type="range" min="0" max="100" value="28"></div><div><label>Thru <span class="val" id="thruV">12</span></label><input id="thru" type="range" min="0" max="100" value="12"></div><div><label>Filter Cf <span class="val" id="filterCfV">72</span></label><input id="filterCf" type="range" min="0" max="100" value="72"></div><div><label>Filter Bw <span class="val" id="filterBwV">00</span></label><input id="filterBw" type="range" min="0" max="100" value="0"></div><div><label>Filter Res <span class="val" id="filterResV">100</span></label><input id="filterRes" type="range" min="0" max="100" value="100"></div><div><label>12p HP <span class="val" id="hp12V">00</span></label><input id="hp12" type="range" min="0" max="100" value="0"></div><div><label>Wind <span class="val" id="windV">98</span></label><input id="wind" type="range" min="0" max="100" value="98"></div><div><label>Wind Speed <span class="val" id="windSpeedV">100</span></label><input id="windSpeed" type="range" min="0" max="100" value="100"></div>
    </div><div class="hint">Noise feeds the resonator. Wind moves branch nodes.</div></div><div class="module"><h2>Rain / Mallet</h2><div class="grid">
      <div><label>Rain <span class="val" id="rainV">71</span></label><input id="rain" type="range" min="0" max="100" value="71"></div><div><label>Speed <span class="val" id="rainSpeedV">70</span></label><input id="rainSpeed" type="range" min="0" max="100" value="70"></div><div><label>Spread <span class="val" id="rainSpreadV">72</span></label><input id="rainSpread" type="range" min="0" max="100" value="72"></div><div><label>Center <span class="val" id="rainCenterV">50</span></label><input id="rainCenter" type="range" min="0" max="100" value="50"></div><div><label>Lo Cut <span class="val" id="mallLoV">18</span></label><input id="mallLo" type="range" min="0" max="100" value="18"></div><div><label>Hi Cut <span class="val" id="mallHiV">72</span></label><input id="mallHi" type="range" min="0" max="100" value="72"></div>

function newTree(){initAudio();audio.ctx.resume();started=true;lfos.forEach(l=>{if(l.sync.classList.contains('on')){l.phase=l.basePhase;l.rand=0;l.target=0;l.value=0;l.lastRand=-1;l.lastT=performance.now()/1000}});rebuildTree(true);running=true;ui.newTree.textContent='Hold';ui.newTree.classList.add('on');ui.stateRead.textContent='resonating'}function stopTree(){running=false;ui.newTree.textContent='New';ui.newTree.classList.remove('on');ui.stateRead.textContent='held'}ui.newTree.onclick=()=>running?stopTree():newTree();
function physicsStep(){if(!tree)return;let stiff=.02+num('stiff')*.16,damp=.88-num('damping')*.42,coup=.005+num('coupling')*.05,grav=raw('gravity')/10000,windAmt=num('wind')*.004,windSpeed=.05+num('windSpeed')*.7,t=performance.now()/1000;for(let b of tree.branches){let root=b.root();for(let i=0;i<b.nodes.length;i++){let nd=b.nodes[i],prev=i===0?root:b.nodes[i-1],desx=prev.x+Math.cos(b.restAngle)*b.length/b.nodes.length,desy=prev.y+Math.sin(b.restAngle)*b.length/b.nodes.length,dx=desx-nd.x,dy=desy-nd.y,wind=Math.sin(t*windSpeed+b.index*.7+i*.17)*windAmt*(1+b.level*.4);let dist=Math.hypot(nd.x-prev.x,nd.y-prev.y)||1,rest=b.length/b.nodes.length,stretch=dist-rest;let fx=dx*stiff+wind+((prev.x-nd.x)/dist)*stretch*coup,fy=dy*stiff+grav+((prev.y-nd.y)/dist)*stretch*coup;nd.vx=(nd.vx+fx)*damp;nd.vy=(nd.vy+fy)*damp;nd.x+=nd.vx;nd.y+=nd.vy}}syncFromMotion();rainTick()}

function tunedFreq(p){let root=36+tonicSemi[el.tonic.value]+raw('shift'),semi=p.freqNorm*12+num('tuneSpread')*p.index*1.7,scale=scaleSteps[el.scale.value];if(scale){let oct=Math.floor(semi/12),pc=((Math.round(semi)%12)+12)%12,best=scale[0],bd=99;for(let st of scale){let d=Math.abs(pc-st);if(d<bd){bd=d;best=st}}semi=oct*12+best}semi+=num('inharm')*(p.index%5)*.7;let fine=lfoMod.pitchFine||0,mode=el.inton.value;if(mode==='Equal Temperament'||mode==='Equal')return midiToHz(clamp(root+semi+fine,28,76));let b=tuningBanks[mode]||tuningBanks['5-Limit'],rootHz=midiToHz(root),step=semi/12*b.period,cycle=Math.floor(step/b.period),degree=Math.round(step-cycle*b.period);if(degree>=b.period){degree=0;cycle++}if(degree<0){degree+=b.period;cycle--}let ratio=b.ratios[degree]||Math.pow(b.repeat,degree/b.period),fineMul=Math.pow(2,fine/12);return clamp(rootHz*Math.pow(b.repeat,cycle)*ratio*fineMul,38,1500)}

ui.canvas.addEventListener('pointerdown',e=>{if(!started)newTree();if(!audio||!tree)return;let rect=ui.canvas.getBoundingClientRect(),x=((e.clientX-rect.left)/rect.width)*2-1,y=(.5-(e.clientY-rect.top)/rect.height)*2,hits=0;audio.resonators.forEach(r=>{let tip=r.branch.tip(),root=r.branch.root(),mx=(tip.x+root.x)*.5,my=(tip.y+root.y)*.5,d=Math.hypot(mx-x,my-y),s=clamp(1-d*.9,0,1);if(s>.01){hits++;bloomRes(r,.65+s*2.8,false);r.branch.nodes.forEach(nd=>{nd.vx+=(nd.x-x)*s*.045;nd.vy+=(nd.y-y)*s*.045})}});if(!hits)audio.resonators.forEach(r=>bloomRes(r,.95,false));ui.hudA.textContent='rebloom';amp=1});

async function startRec(){
